---
- name: Configure EC2 instance
  hosts: all
  become: true

  vars:
    app_port: 80

  tasks:
    - name: Install nginx
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Ensure nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Write demo index page
      ansible.builtin.copy:
        dest: /usr/share/nginx/html/index.html
        content: |
          <html>
            <body>
              <h1>Provisioned by Terraform</h1>
              <p>Configured by Ansible Automation Platform</p>
              <p>Host: {{ inventory_hostname }}</p>
            </body>
          </html>
        mode: '0644'

    - name: Open firewall port for nginx
      ansible.builtin.firewalld:
        port: "{{ app_port }}/tcp"
        permanent: true
        state: enabled
        immediate: true